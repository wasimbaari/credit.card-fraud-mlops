name: DevSecOps MLOps Pipeline

on:
push:
branches: [ main ]

permissions:
id-token: write
contents: read

jobs:
code-security-scans:
name: Code & IaC Security Scans
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  # 1. Checkov (IaC & Dockerfile Scan)
  - name: Run Checkov
    uses: bridgecrewio/checkov-action@master
    with:
      directory: .
      framework: terraform,dockerfile
      skip_check: CKV_TF_1
      soft_fail: true
      quiet: true

  # 2. Snyk (Dependency Scan)
  - name: Run Snyk for Python Dependencies
    uses: snyk/actions/python@master
    continue-on-error: true
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    with:
      args: --severity-threshold=high
```

build-scan-deploy:
name: Build, Container Scan, and Push
needs: code-security-scans
runs-on: ubuntu-latest

```
env:
  IMAGE_NAME: fraud-training
  VERSION: v${{ github.run_number }}

steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  # 3. Configure AWS (OIDC)
  - name: Configure AWS Credentials
    uses: aws-actions/configure-aws-credentials@v4
    with:
      role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      role-session-name: GitHub_to_AWS_via_FederatedOIDC
      aws-region: ap-south-1

  # 4. Login to ECR
  - name: Login to Amazon ECR
    id: login-ecr
    uses: aws-actions/amazon-ecr-login@v2

  # 5. Build Docker Image
  - name: Build Docker Image
    run: |
      docker build \
        -f docker/training.Dockerfile \
        -t ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }} .

  # 6. Trivy Scan (NON-BLOCKING)
  - name: Run Trivy Vulnerability Scanner
    uses: aquasecurity/trivy-action@master
    continue-on-error: true   # 🔥 does not stop pipeline
    with:
      image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
      format: table
      exit-code: '0'          # 🔥 ensures success even with vulnerabilities
      ignore-unfixed: true
      vuln-type: os,library
      severity: CRITICAL,HIGH

  # 7. Push to ECR (always runs)
  - name: Push Image to ECR
    run: |
      docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
```
